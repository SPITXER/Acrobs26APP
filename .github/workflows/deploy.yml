name: Build & Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - 'readme.txt'
      - '.gitignore'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.2'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build web
        run: flutter build web --release

      - name: Update docs/ and push
        run: |
          cp -r build/web/. docs/
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --staged --quiet && echo "No changes to deploy." || \
            git commit -m "Deploy: rebuild docs/ [skip ci]" && git push
